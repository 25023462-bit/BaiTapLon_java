name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Maven clean test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          cache-dependency-path: '**/pom.xml'

      - name: Find Maven project
        id: maven-project
        shell: bash
        run: |
          set -euo pipefail

          if [ -f pom.xml ]; then
            echo "directory=." >> "$GITHUB_OUTPUT"
            exit 0
          fi

          pom_file="$(find . -path './target' -prune -o -name pom.xml -print -quit)"

          if [ -n "$pom_file" ]; then
            echo "directory=$(dirname "$pom_file")" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "directory=" >> "$GITHUB_OUTPUT"

      - name: Run Maven tests
        shell: bash
        run: |
          set -euo pipefail

          project_dir="${{ steps.maven-project.outputs.directory }}"

          if [ -n "$project_dir" ] && [ -f "$project_dir/pom.xml" ]; then
            cd "$project_dir"
            mvn "-Djava.version=17" clean test
          else
            echo "pom.xml not found in detected working directory; retrying from repository root."
            mvn "-Djava.version=17" clean test
          fi
