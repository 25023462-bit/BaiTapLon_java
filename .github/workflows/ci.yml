name: BidPlaza CI

# Chạy khi push hoặc pull request vào nhánh main
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Lấy code từ repo
      - name: Checkout code
        uses: actions/checkout@v4

      # Bước 2: Cài Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # Bước 3: Cache Maven để build nhanh hơn lần sau
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      # Bước 4: Build và chạy tất cả JUnit test
      - name: Build and run tests
        run: mvn clean test
        working-directory: ./bidplaza

      # Bước 5: Hiện kết quả test (kể cả khi fail)
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: bidplaza/target/surefire-reports/
